<!DOCTYPE html>
<html>
<head>
    <title>Bufflehead Predictor</title>
</head>
<body>
    <h2>Bufflehead Prediction Form</h2>

    <form action="/predict" method="post">
        <label>Locality:</label><br>
        <input type="text" name="locality" value="Town Dock Park, Port Washington"><br><br>

        <label>Event Date:</label><br>
        <input type="text" name="eventdate" value="2024-01-12"><br><br>

        <label>Month:</label><br>
        <input type="number" name="month" value="1"><br><br>

        <label>Winter Season:</label><br>
        <input type="number" name="winter_season" value="2023"><br><br>

        <label>Day of Year:</label><br>
        <input type="number" name="day_of_year" value="12"><br><br>

        <label>Average Wind Speed:</label><br>
        <input type="number" step="0.1" name="avg_wind_speed" value="4.2"><br><br>

        <label>Year:</label><br>
        <input type="number" name="year" value="2024"><br><br>

        <label>Average Temperature:</label><br>
        <input type="number" step="0.1" name="avg_temp" value="33"><br><br>

        <label>Day:</label><br>
        <input type="number" name="day" value="12"><br><br>

        <label>Average Precipitation:</label><br>
        <input type="number" step="0.01" name="avg_precipitation" value="0.01"><br><br>

        <button type="submit">Predict</button>
    </form>
</body>
</html>
